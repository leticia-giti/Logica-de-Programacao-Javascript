<!DOCTYPE html>
<html lag="pt-br">
    <body>
        <script>
            alert("Analisador de viagem!")
            var saldo = +prompt("Digite o saldo atual: ");

            if(saldo >= 20000){
                document.write("Você possui saldo R$" + saldo + "<br>");
                document.write("Arrume as malas, você vai para  a Europa.");
            }
            else{
                if(saldo >= 3000 & saldo < 20000){
                    document.write("Você possui saldo R$" + saldo + "<br>");
                    document.write("Arrume as malas, você vai para  a Brasil.");
                }
                else{
                    document.write("Você possui saldo R$" + saldo + "<br>");
                    document.write("Fique em casa! Aproveite para descansar.");
                }
                
            }

        
            
        </script>
    </body>
</html>

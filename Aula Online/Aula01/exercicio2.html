<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Minha Primeira Página</title>
    </head>
    <body>
        <script>
            let numero1 = +prompt("Digite o primeiro número: ");
            let numero2 = +prompt("Digite o segundo número: ");

            document.write("<p>Você digitou:"+numero1+"e"+numero2+"</p>");
            
            let soma = numero1 + numero2;
            console.log("Valores digitados: ", numero1,numero2);
            console.log("Soma: ", soma);
        </script>
    </body>
</html>
